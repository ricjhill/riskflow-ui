name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Assert test count floor
        run: |
          COUNT=$(grep -oP '<testsuites[^>]*tests="\K\d+' reports/unit.xml | head -1)
          FLOOR=50
          echo "Test count: $COUNT (floor: $FLOOR)"
          if [ "$COUNT" -lt "$FLOOR" ]; then
            echo "FAIL: Test count $COUNT is below floor $FLOOR"
            exit 1
          fi

      - name: Type check
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Architecture boundary check
        run: npm run lint:boundaries

      - name: Verify generated types are up to date
        run: |
          npm run generate:types
          git diff --exit-code src/types/api.generated.ts || (echo "Generated types are stale — run: npm run generate:types" && exit 1)

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: reports/
          retention-days: 30

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unit Tests
          path: reports/*.xml
          reporter: java-junit

  harness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run harness tests
        run: npx vitest run tools/

      - name: Validate hook scripts
        run: |
          for hook in .claude/hooks/*.sh; do
            bash -n "$hook" && echo "OK: $hook" || exit 1
          done

  boot-test:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Check for relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'Dockerfile'
              - 'nginx.conf'
              - 'package.json'
              - 'package-lock.json'

      - name: Build and start container
        if: steps.filter.outputs.app == 'true'
        run: |
          docker build -t riskflow-ui:test .
          docker run -d --name riskflow-ui-test -p 3000:3000 riskflow-ui:test

      - name: Wait for container
        if: steps.filter.outputs.app == 'true'
        run: sleep 3

      - name: Smoke test — index page
        if: steps.filter.outputs.app == 'true'
        run: |
          curl --fail --retry 5 --retry-delay 2 --retry-all-errors http://localhost:3000/ | grep -q '<div id="root">'
          echo "Index page OK"

      - name: Smoke test — static assets
        if: steps.filter.outputs.app == 'true'
        run: |
          curl -s http://localhost:3000/ | grep -oP 'src="/assets/[^"]+\.js"' > /dev/null
          echo "Static assets OK"

      - name: Smoke test — SPA fallback
        if: steps.filter.outputs.app == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/nonexistent-route)
          [ "$STATUS" = "200" ] && echo "SPA fallback OK" || (echo "Expected 200, got $STATUS" && exit 1)

      - name: Smoke test — nginx proxy config
        if: steps.filter.outputs.app == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/sessions)
          [ "$STATUS" = "502" ] && echo "Proxy config OK (502 = backend not running, nginx routes correctly)" || (echo "Expected 502, got $STATUS" && exit 1)

      - name: Teardown
        if: always()
        run: docker rm -f riskflow-ui-test 2>/dev/null || true

  security:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Code pattern security scan
        run: |
          FOUND=0
          for pattern in 'dangerouslySetInnerHTML' 'eval(' 'innerHTML' 'document\.write'; do
            HITS=$(grep -rn "$pattern" src/ --include='*.ts' --include='*.tsx' | grep -v '.test.' || true)
            if [ -n "$HITS" ]; then
              echo "SECURITY: Found '$pattern':"
              echo "$HITS"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "Review the above patterns for XSS vulnerabilities"
            exit 1
          fi
          echo "Code pattern scan: CLEAN"
