name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Architecture boundary check
        run: npm run lint:boundaries

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: reports/
          retention-days: 30

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unit Tests
          path: reports/*.xml
          reporter: java-junit

  boot-test:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Check for relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'Dockerfile'
              - 'nginx.conf'
              - 'package.json'
              - 'package-lock.json'

      - name: Build and start container
        if: steps.filter.outputs.app == 'true'
        run: |
          docker build -t riskflow-ui:test .
          docker run -d --name riskflow-ui-test -p 3000:3000 riskflow-ui:test

      - name: Wait for container
        if: steps.filter.outputs.app == 'true'
        run: sleep 3

      - name: Smoke test — index page
        if: steps.filter.outputs.app == 'true'
        run: |
          curl --fail --retry 5 --retry-delay 2 --retry-all-errors http://localhost:3000/ | grep -q '<div id="root">'
          echo "Index page OK"

      - name: Smoke test — static assets
        if: steps.filter.outputs.app == 'true'
        run: |
          curl -s http://localhost:3000/ | grep -oP 'src="/assets/[^"]+\.js"' > /dev/null
          echo "Static assets OK"

      - name: Smoke test — SPA fallback
        if: steps.filter.outputs.app == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/nonexistent-route)
          [ "$STATUS" = "200" ] && echo "SPA fallback OK" || (echo "Expected 200, got $STATUS" && exit 1)

      - name: Smoke test — nginx proxy config
        if: steps.filter.outputs.app == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/sessions)
          [ "$STATUS" = "502" ] && echo "Proxy config OK (502 = backend not running, nginx routes correctly)" || (echo "Expected 502, got $STATUS" && exit 1)

      - name: Teardown
        if: always()
        run: docker rm -f riskflow-ui-test 2>/dev/null || true

  security:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
