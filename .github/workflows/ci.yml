name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Assert test count floor
        run: |
          COUNT=$(grep -oP '<testsuites[^>]*tests="\K\d+' reports/unit.xml | head -1)
          FLOOR=50
          echo "Test count: $COUNT (floor: $FLOOR)"
          if [ "$COUNT" -lt "$FLOOR" ]; then
            echo "FAIL: Test count $COUNT is below floor $FLOOR"
            exit 1
          fi

      - name: Type check
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Architecture boundary check
        run: npm run lint:boundaries

      - name: Verify generated types are up to date
        run: |
          npm run generate:types
          git diff --exit-code src/types/api.generated.ts || (echo "Generated types are stale — run: npm run generate:types" && exit 1)

      - name: Coverage summary
        if: always() && hashFiles('reports/coverage/coverage-summary.json') != ''
        run: |
          node -e "
          const summary = require('./reports/coverage/coverage-summary.json');
          const t = summary.total;
          const fmt = (m) => m.pct.toFixed(1) + '% (' + m.covered + '/' + m.total + ')';
          console.log('## Test Coverage\n');
          console.log('| Metric | Coverage |');
          console.log('|--------|----------|');
          console.log('| Statements | ' + fmt(t.statements) + ' |');
          console.log('| Branches | ' + fmt(t.branches) + ' |');
          console.log('| Functions | ' + fmt(t.functions) + ' |');
          console.log('| Lines | ' + fmt(t.lines) + ' |');
          " >> $GITHUB_STEP_SUMMARY

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && hashFiles('reports/coverage/coverage-summary.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('reports/coverage/coverage-summary.json', 'utf8'));
            const t = summary.total;
            const fmt = (m) => `${m.pct.toFixed(1)}% (${m.covered}/${m.total})`;

            const table = [
              '## Test Coverage',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              `| Statements | ${fmt(t.statements)} |`,
              `| Branches | ${fmt(t.branches)} |`,
              `| Functions | ${fmt(t.functions)} |`,
              `| Lines | ${fmt(t.lines)} |`,
              '',
              '_Updated by CI on every push._',
            ].join('\n');

            const marker = '<!-- coverage-report -->';
            const body = marker + '\n' + table;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: reports/
          retention-days: 30

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unit Tests
          path: reports/unit.xml
          reporter: java-junit

  harness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run harness tests
        run: npx vitest run tools/

      - name: Validate hook scripts
        run: |
          for hook in .claude/hooks/*.sh; do
            bash -n "$hook" && echo "OK: $hook" || exit 1
          done

  boot-test:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Check for relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'Dockerfile'
              - 'nginx.conf'
              - 'package.json'
              - 'package-lock.json'

      - name: Build and start container
        if: steps.filter.outputs.app == 'true'
        run: |
          docker build -t riskflow-ui:test .
          docker run -d --name riskflow-ui-test -p 3000:3000 riskflow-ui:test

      - name: Wait for container
        if: steps.filter.outputs.app == 'true'
        run: sleep 3

      - name: Smoke test — index page
        if: steps.filter.outputs.app == 'true'
        run: |
          curl --fail --retry 5 --retry-delay 2 --retry-all-errors http://localhost:3000/ | grep -q '<div id="root">'
          echo "Index page OK"

      - name: Smoke test — static assets
        if: steps.filter.outputs.app == 'true'
        run: |
          curl -s http://localhost:3000/ | grep -oP 'src="/assets/[^"]+\.js"' > /dev/null
          echo "Static assets OK"

      - name: Smoke test — SPA fallback
        if: steps.filter.outputs.app == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/nonexistent-route)
          [ "$STATUS" = "200" ] && echo "SPA fallback OK" || (echo "Expected 200, got $STATUS" && exit 1)

      - name: Smoke test — nginx proxy config
        if: steps.filter.outputs.app == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/sessions)
          [ "$STATUS" = "502" ] && echo "Proxy config OK (502 = backend not running, nginx routes correctly)" || (echo "Expected 502, got $STATUS" && exit 1)

      - name: Teardown
        if: always()
        run: docker rm -f riskflow-ui-test 2>/dev/null || true

  visual-smoke:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Check for relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'Dockerfile'
              - 'nginx.conf'
              - 'package.json'
              - 'package-lock.json'
              - 'screenshot-assertions.json'
              - 'tools/visual-smoke.sh'

      - name: Build and start container
        if: steps.filter.outputs.app == 'true'
        run: |
          docker build -t riskflow-ui:test .
          docker run -d --name riskflow-ui-test -p 3000:3000 riskflow-ui:test

      - name: Wait for container
        if: steps.filter.outputs.app == 'true'
        run: |
          for i in $(seq 1 10); do
            curl -s http://localhost:3000/ > /dev/null && break || sleep 1
          done
          curl -sf http://localhost:3000/ > /dev/null || (echo "Container never became ready" && exit 1)

      - name: Install uv
        if: steps.filter.outputs.app == 'true'
        uses: astral-sh/setup-uv@v4

      - name: Start Chrome
        if: steps.filter.outputs.app == 'true'
        run: uvx rodney start

      - name: Run visual smoke assertions
        if: steps.filter.outputs.app == 'true'
        run: tools/visual-smoke.sh http://localhost:3000

      - name: Teardown
        if: always()
        run: docker rm -f riskflow-ui-test 2>/dev/null || true

  security:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Code pattern security scan
        run: |
          source tools/security-patterns.sh
          scan_security_patterns src/ block
