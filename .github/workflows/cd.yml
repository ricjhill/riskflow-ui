name: CD Delivery

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}/riskflow-ui:latest .

      - name: Tag with commit SHA
        run: docker tag ghcr.io/${{ github.repository }}/riskflow-ui:latest ghcr.io/${{ github.repository }}/riskflow-ui:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}/riskflow-ui:latest
          docker push ghcr.io/${{ github.repository }}/riskflow-ui:${{ github.sha }}
