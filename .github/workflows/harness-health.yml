name: Harness Health

on:
  schedule:
    - cron: '0 9 * * 1' # Monday 9 AM UTC
  workflow_dispatch:

jobs:
  doc-freshness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Validate documentation freshness
        run: tools/validate-docs.sh

      - name: Code pattern security check
        run: |
          source tools/security-patterns.sh
          scan_security_patterns src/ warn

  code-hygiene:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Architecture boundaries
        run: npm run lint:boundaries

      - name: Check for any types
        run: |
          HITS=$(grep -rn ': any\b\|as any\b' src/ --include='*.ts' --include='*.tsx' || true)
          if [ -n "$HITS" ]; then
            echo "WARNING: 'any' types found:"
            echo "$HITS"
            exit 1
          fi
          echo "No 'any' types found"

      - name: Check for stale patterns
        run: |
          FOUND=0
          TODOS=$(grep -rn 'TODO\|FIXME\|HACK' src/ --include='*.ts' --include='*.tsx' || true)
          CONSOLE=$(grep -rn 'console\.log' src/ --include='*.ts' --include='*.tsx' | grep -v '.test.' || true)
          if [ -n "$TODOS" ]; then
            echo "TODOs/FIXMEs found:"
            echo "$TODOS"
            FOUND=1
          fi
          if [ -n "$CONSOLE" ]; then
            echo "console.log in production code:"
            echo "$CONSOLE"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            echo "Stale patterns detected — run /cleanup to address"
            exit 1
          fi
          echo "No stale patterns found"

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Outdated packages
        run: npm outdated || true
