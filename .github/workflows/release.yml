name: Release

# Runs after CI passes on main — classifies commits since last tag,
# bumps version, updates CHANGELOG.md, and creates a GitHub release.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Skip if last commit is a release
        id: skip
        run: |
          LAST_MSG=$(git log -1 --format=%s)
          if [[ "$LAST_MSG" == Release\ v* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Last commit is a release — skipping to prevent infinite loop"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node
        if: steps.skip.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.skip.outputs.skip == 'false'
        run: npm ci

      - name: Get last release tag
        if: steps.skip.outputs.skip == 'false'
        id: last_tag
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "has_previous=false" >> $GITHUB_OUTPUT
            echo "No previous release tag — this will be the initial release"
          else
            echo "has_previous=true" >> $GITHUB_OUTPUT
            echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "Latest tag: $LATEST_TAG"
          fi

      - name: Classify commits
        if: steps.skip.outputs.skip == 'false'
        id: changes
        run: |
          if [ "${{ steps.last_tag.outputs.has_previous }}" = "false" ]; then
            echo "kind=NONE" >> $GITHUB_OUTPUT
            echo "Initial release — no version bump needed"
            exit 0
          fi

          TAG="${{ steps.last_tag.outputs.tag }}"
          COMMITS_JSON=$(git log "${TAG}..HEAD" --format=%s | jq -R . | jq -s .)
          if [ "$COMMITS_JSON" = "[]" ]; then
            echo "kind=NONE" >> $GITHUB_OUTPUT
            echo "No commits since $TAG"
            exit 0
          fi

          KIND=$(npx tsx -e "
            import { classifyCommits } from './tools/detect-changes';
            const msgs = JSON.parse(process.argv[1]);
            console.log(classifyCommits(msgs));
          " "$COMMITS_JSON")

          echo "kind=$KIND" >> $GITHUB_OUTPUT
          echo "Change kind: $KIND"

      - name: Compute next version
        if: steps.skip.outputs.skip == 'false'
        id: version
        run: |
          CHANGE_KIND="${{ steps.changes.outputs.kind }}"
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          echo "Current version: $CURRENT"

          if [ "${{ steps.last_tag.outputs.has_previous }}" = "false" ]; then
            echo "new_version=$CURRENT" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Initial release at v$CURRENT"
          elif [ "$CHANGE_KIND" = "NONE" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No changes — skipping release"
          else
            NEW=$(npx tsx -e "
              import { computeNextVersion } from './tools/bump-version';
              console.log(computeNextVersion(process.argv[1], process.argv[2]));
            " "$CURRENT" "$CHANGE_KIND")
            echo "new_version=$NEW" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "$CHANGE_KIND change: $CURRENT → $NEW"
          fi

      - name: Generate changelog
        if: steps.skip.outputs.skip == 'false' && steps.version.outputs.should_release == 'true' && steps.last_tag.outputs.has_previous == 'true'
        id: changelog
        run: |
          TAG="${{ steps.last_tag.outputs.tag }}"
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          CURRENT=$(cat VERSION | tr -d '[:space:]')

          # Get commit messages as newline-delimited, pass as JSON array
          COMMITS_JSON=$(git log "${TAG}..HEAD" --format=%s | jq -R . | jq -s .)

          npx tsx -e "
            import { generateChangelog } from './tools/detect-changes';
            const msgs = JSON.parse(process.argv[3]);
            console.log(generateChangelog(process.argv[1], process.argv[2], msgs));
          " "$CURRENT" "$NEW_VERSION" "$COMMITS_JSON" > /tmp/release-notes.md

      - name: Update VERSION and package.json
        if: steps.skip.outputs.skip == 'false' && steps.version.outputs.should_release == 'true' && steps.last_tag.outputs.has_previous == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          echo "$NEW_VERSION" > VERSION
          npm version "$NEW_VERSION" --no-git-tag-version

      - name: Update CHANGELOG.md
        if: steps.skip.outputs.skip == 'false' && steps.version.outputs.should_release == 'true' && steps.last_tag.outputs.has_previous == 'true'
        run: |
          if [ -f CHANGELOG.md ]; then
            # Prepend new entry after the title line
            {
              head -1 CHANGELOG.md
              echo ""
              cat /tmp/release-notes.md
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
          else
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat /tmp/release-notes.md >> CHANGELOG.md
          fi

      - name: Commit version bump
        if: steps.skip.outputs.skip == 'false' && steps.version.outputs.should_release == 'true' && steps.last_tag.outputs.has_previous == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json CHANGELOG.md
          git commit -m "Release v${NEW_VERSION}

          Automated by release workflow based on Conventional Commit classification.
          Change kind: ${{ steps.changes.outputs.kind }}"
          git push

      - name: Create GitHub release
        if: steps.skip.outputs.skip == 'false' && steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"

          if [ "${{ steps.last_tag.outputs.has_previous }}" = "false" ]; then
            echo "Initial release at v${NEW_VERSION}." > /tmp/release-notes.md
          fi

          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --notes-file /tmp/release-notes.md \
            --target main
