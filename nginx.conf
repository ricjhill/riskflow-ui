server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (bordereaux spreadsheets)
    client_max_body_size 50m;

    # Resolve upstream lazily so nginx starts even when the API is unavailable.
    # Docker's embedded DNS is at 127.0.0.11; outside Docker, use a public resolver.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend "http://api:8000";

    # API requests → backend
    location /sessions {
        proxy_pass $backend;
    }
    location /schemas {
        proxy_pass $backend;
    }
    location /sheets {
        proxy_pass $backend;
    }
    location /upload {
        proxy_pass $backend;
    }
    location /health {
        proxy_pass $backend;
    }
    location /corrections {
        proxy_pass $backend;
    }
    location /jobs {
        proxy_pass $backend;
    }

    # SPA fallback — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
