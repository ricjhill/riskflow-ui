server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # API requests → backend
    location /sessions {
        proxy_pass http://api:8000;
    }
    location /schemas {
        proxy_pass http://api:8000;
    }
    location /sheets {
        proxy_pass http://api:8000;
    }
    location /upload {
        proxy_pass http://api:8000;
    }
    location /health {
        proxy_pass http://api:8000;
    }
    location /corrections {
        proxy_pass http://api:8000;
    }
    location /jobs {
        proxy_pass http://api:8000;
    }

    # SPA fallback — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
